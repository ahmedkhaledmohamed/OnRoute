name: Detour
options:
  bundleIdPrefix: com.ahmedkhaled
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  generateEmptyDirectories: true

targets:
  Detour:
    type: application
    platform: iOS
    sources:
      - Detour
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ahmedkhaled.detour
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "12"
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: false
        INFOPLIST_KEY_CFBundleDisplayName: "OnRoute"
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "OnRoute uses your location to find places along your route"
        DEVELOPMENT_TEAM: "VMXQN9K3P2"
    info:
      path: Detour/Info.plist
      properties:
        LSApplicationQueriesSchemes:
          - comgooglemaps
          - waze
